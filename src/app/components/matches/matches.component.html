
<h2 *ngIf="!!matchesTours.length" class="match-title">{{ matchesTours[activeTabs.cupTourId - 1] }} тур</h2>

<div *ngFor="let tourMatches of currentLeagueMatches; index as i">
  <ul class="matches-list" *ngIf="activeTabs.tourId === i+1">
    <li 
      class="match-item"
      [ngClass]="{
        'up-half': match.type === 'up',
        'down-half': match.type === 'down'
      }"
      *ngFor="let match of tourMatches">
      <a [href]="'https://www.sports.ru/fantasy/football/'+(service.urlName$ | async)+'/'+getTeamId(match.home)" target="_blank">
        <div class="team home-team">
          <div class="name-container">
            <p class="team-name">{{ getTeamTitle(match.home) }}</p>
            <p class="player-name">{{ getProfileInfo(match.home).name }}</p>
          </div>
          <div class="logo-container">
            <img
              class="logo-img opponent"
              [src]="!!getTeamLogo(match.home) ?
                getTeamLogo(match.home) : 'assets/logos/default.png'"
              [alt]="!!getTeamTitle(match.home) ?
                getTeamTitle(match.home) : ''"
            >
          </div>
          <span
            class="result"
            [ngClass]="{
              'green-text':  getMatchResult(tourMatches, match.home) === 1 && i < lastTour,
              'red-text':    getMatchResult(tourMatches, match.home) === 2 && i < lastTour,
              'grey-text':   getMatchResult(tourMatches, match.home) === 0 && i < lastTour
            }">
            {{ match.home_score }}
          </span>
        </div>
      </a>
      <span>-</span>
      <a [href]="'https://www.sports.ru/fantasy/football/'+(service.urlName$ | async)+'/'+getTeamId(match.away)" target="_blank">
        <div class="team away-team">
          <div class="name-container">
            <p class="team-name">{{ getTeamTitle(match.away) }}</p>
            <p class="player-name">{{ getProfileInfo(match.away).name }}</p>
          </div>
          <div class="logo-container">
            <img
              class="logo-img opponent"
              [src]="!!getTeamLogo(match.away) ?
                getTeamLogo(match.away) : 'assets/logos/default.png'"
              [alt]="!!getTeamTitle(match.away) ?
                getTeamTitle(match.away) : ''"
            >
          </div>
          <span 
            class="result"
            [ngClass]="{
              'green-text':  getMatchResult(tourMatches, match.home) === 2 && i < lastTour,
              'red-text':    getMatchResult(tourMatches, match.home) === 1 && i < lastTour,
              'grey-text':   getMatchResult(tourMatches, match.home) === 0 && i < lastTour
            }">
            {{ match.away_score }}
          </span>
        </div>
      </a>
    </li>
  </ul>
</div>
